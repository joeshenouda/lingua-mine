dump_dir: /checkpoints/checkpoints/jsheno/jsheno-llama-1b-wsd-wd-0-1
name: jsheno-llama-1b-wsd-wd-0-1
# steps: 60_000
steps: 95_367
probe_freq: null
seed: 777

optim:
  lr: 1.7614e-3
  weight_decay: 0.1
  warmup: 4000
  lr_min_ratio: 0.17032
  clip: 1.0
  scheduler: wsd

distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1

model:
  dim: 2048
  n_layers: 25
  n_heads: 16

data:
  root_dir: /scratch/scratch/jsheno/pnorms_lingua/lingua/data  # Absolute path
  sources:
    fineweb_edu_100bt: 100.0
  batch_size: 2     # micro batch size (per gpu)
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: sp
    path: /scratch/scratch/jsheno/pnorms_lingua/lingua/gemma-tokenizer/tokenizer.model  # Absolute path

profiling:
  run: true
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  path: null  # Don't load any checkpoint
  dump:
    # every: 2500
    every: 2500
    keep: -1
  eval:
    every: 5000
    keep: -1

logging:
  freq: 1
  tensorboard:
      comment: "tensorboard-llama"