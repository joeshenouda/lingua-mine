dump_dir: /checkpoints/checkpoints/jsheno/jsheno-500m-wsd-wd-0-1-inject-bios-a-20-stable-20-cooldown
name: jsheno-500m-wsd-wd-0-1-inject-bios-a-20-stable-20-cooldown
# steps: 60_000
# 25B tokens total
# (2*64*4096) = 524288 tokens per step
# 25B / 524288 ~= 47,684 steps
steps: 47_684
probe_freq: 10
seed: 777
update_norms_freq: 10

optim:
  lr: 0.001753
  weight_decay: 0.1
  warmup: 2000
  lr_min_ratio: 0.1712
  clip: 1.0
  scheduler: wsd


distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1

model:
  dim: 1024
  n_layers: 25
  n_heads: 16

data:
  root_dir: /scratch/scratch/jsheno/pnorms_lingua/lingua/data  # Absolute path
  sources:
    fineweb_edu_100bt_small_val: 100.0
  batch_size: 2     # micro batch size (per gpu)
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: /scratch/scratch/jsheno/pnorms_lingua/lingua/tiktoken-tokenizer/9b5ad71b2ce5302211f9c61530b329a4922fc6a4  # Absolute path


profiling:
  run: true
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  path: null  # Don't load any checkpoint
  dump:
    every: 500
    keep: -1
  eval:
    every: 5000
    keep: -1
  init_ckpt_path: /checkpoints/checkpoints/jsheno/jsheno-500m-wsd-tiktoken-wd-0-1/checkpoints/0000037500
  continue_training_from_init: true

logging:
  freq: 1
  tensorboard:
      comment: "tensorboard-llama"

validation:
    max_steps: 50  # Limit validation steps

validation_freq: 5000  # Run validation every 5k steps

# Add to your config.yaml
# 20 injections every 225 steps during stable
# 20 injections every 225 steps during cooldown
injection_steps: [38725, 38950, 39175, 39400, 39625, 39850, 40075, 40300, 40525, 40750, 40975, 41200, 41425, 41650, 41875, 42100, 42325, 42550, 42775, 43000, 43225, 43450, 43675, 43900, 44125, 44350, 44575, 44800, 45025, 45250, 45475, 45700, 45925, 46150, 46375, 46600, 46825, 47050, 47275, 47500]
injection_file: "injection_bios_line_1_125.jsonl"  # Your injection data file
