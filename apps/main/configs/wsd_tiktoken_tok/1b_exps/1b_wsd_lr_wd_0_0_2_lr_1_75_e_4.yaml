dump_dir: /checkpoints/checkpoints/jsheno/jsheno-1b-wsd-tiktoken-wd-0-0-2-lr-1-75-e-4
name: jsheno-1b-wsd-tiktoken-wd-0-0-2-lr-1-75-e-4
# steps: 60_000
steps: 95_367
probe_freq: 100
seed: 777

optim:
  lr: 1.7614e-3
  weight_decay: 0.02
  warmup: 4000
  lr_min_ratio: 0.09931106496
  clip: 1.0
  scheduler: wsd

distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1

model:
  dim: 2048
  n_layers: 25
  n_heads: 16

data:
  root_dir: /scratch/scratch/jsheno/pnorms_lingua/lingua/data  # Absolute path
  sources:
    fineweb_edu_100bt_small_val: 100.0
  batch_size: 2     # micro batch size (per gpu)
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: /scratch/scratch/jsheno/pnorms_lingua/lingua/tiktoken-tokenizer/9b5ad71b2ce5302211f9c61530b329a4922fc6a4  # Absolute path

profiling:
  run: true
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  path: null  # Don't load any checkpoint
  dump:
    # every: 2500
    every: 2500
    keep: -1
  eval:
    every: 5000
    keep: -1
  init_ckpt_path: /checkpoints/checkpoints/jsheno/jsheno-1b-wsd-tiktoken-wd-0-0-2/checkpoints/0000085000
  continue_training_from_init: true


logging:
  freq: 1
  tensorboard:
      comment: "tensorboard-llama"

validation:
    max_steps: 50  # Limit validation steps

validation_freq: 5000  # Run validation every 5k steps