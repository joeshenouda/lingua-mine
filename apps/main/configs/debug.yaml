# Template config, need to change dump_dir, data.root_dir and data.tokenizer.path

dump_dir: /checkpoints/checkpoints/jsheno/debug-100b-gemma-tok-small-val
name: "debug-100b-gemma-tok-small-val"
steps: 500
probe_freq: 10
seed: 777
optim:
    lr: 3e-4
    warmup: 2000
    lr_min_ratio: 0.000001
    clip: 10.0

distributed:
    fsdp_type: full_shard
    compile: false
    model_dtype: bf16
    matmul_allow_tf32: false
    selective_activation_checkpointing: false
    tp_size: 1

model:
    dim: 1024
    n_layers: 8
    n_heads: 8

data:
    root_dir: /scratch/scratch/jsheno/pnorms_lingua/lingua/data  # Absolute path
    batch_size: 4
    prefetch_size: 8
    sources:
        fineweb_edu_100bt_small_val: 100.0
    seq_len: 512
    n_views: 2
    load_async: false
    tokenizer:
        name: sp
        path: /scratch/scratch/jsheno/pnorms_lingua/lingua/gemma-tokenizer/tokenizer.model  # Absolute path

profiling:
    run: true

checkpoint:
    dump:
        every: 100
        keep: -1
    eval:
        every: 100
        keep: 1

logging:
    freq: 10
    tensorboard:
        comment: "tensorboard-test"

log_layer_metrics_freq: 10
# Validation during training (no checkpoint reloading)
validation:
    max_steps: 50  # Limit validation steps

validation_freq: 10  # Run validation every 50 steps

